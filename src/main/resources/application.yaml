server:
  port: ${PORT:8080}
  address: 0.0.0.0

spring:
  application:
    name: smart-school-backend

  spring:
  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        database-platform: org.hibernate.dialect.PostgreSQLDialect

  security:
    user:
      name: admin
      password: admin123

jwt:
  secret: "mysupersecretkeymysupersecretkey123"
  expiration: 86400000